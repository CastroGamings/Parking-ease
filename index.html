<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Parking Finder</title>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0b0e14;
      color: #ffffff;
    }

    #map {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Top Search Bar */
    .search-container {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      align-items: center;
      background: rgba(13, 17, 26, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 6px 6px 6px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 17px;
      font-weight: 500;
      outline: none;
    }

    .search-input::placeholder {
      color: #8e8e93;
    }

    .search-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2563eb;
      border: none;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-btn:active {
      background: #1d4ed8;
    }

    /* Overlay Panel Layout */
    .panels-container {
      position: absolute;
      top: 80px;
      left: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 12px;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      background: rgba(13, 17, 26, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    /* Nearest Parking Panel */
    .nearest-panel {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 220px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-weight: 700;
      font-size: 15px;
    }

    .hide-btn {
      background: rgba(255, 255, 255, 0.12);
      border: none;
      color: #a1a1aa;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Filter Chips */
    .filter-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .filter-scroll::-webkit-scrollbar {
      display: none;
    }

    .chip {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e4e4e7;
      padding: 5px 12px;
      border-radius: 14px;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chip.active {
      background: #1d4ed8;
      border-color: #3b82f6;
      color: #ffffff;
    }

    .status-text {
      font-size: 13px;
      color: #9ca3af;
      padding: 8px 0;
      text-align: center;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .result-item {
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Legend Panel */
    .legend-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #e4e4e7;
      font-weight: 500;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.free { background-color: #22c55e; }
    .dot.paid { background-color: #f97316; }
    .dot.timed { background-color: #eab308; }
    .dot.no-parking { background-color: #ef4444; }
    .dot.hgv { background-color: #a855f7; }

    /* Bottom Action Floating Buttons */
    .fab-container {
      position: absolute;
      bottom: 110px;
      right: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fab {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(13, 17, 26, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Search location..." value="Dover">
    <button id="searchBtn" class="search-btn">
      <i data-lucide="search"></i>
    </button>
  </div>

  <!-- Panels overlay -->
  <div class="panels-container">
    <!-- Nearest Parking Box -->
    <div class="panel nearest-panel" id="nearestPanel">
      <div class="panel-header">
        <span class="panel-title">Nearest Parking</span>
        <button class="hide-btn" onclick="toggleNearestPanel()">Hide</button>
      </div>

      <div class="filter-scroll">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="free"><span class="dot free"></span>Free</button>
        <button class="chip" data-filter="paid"><span class="dot paid"></span>Paid</button>
        <button class="chip" data-filter="timed"><span class="dot timed"></span>Timed</button>
        <button class="chip" data-filter="no-parking"><span class="dot no-parking"></span>No Parking</button>
        <button class="chip" data-filter="hgv"><span class="dot hgv"></span>HGV</button>
      </div>

      <div id="statusText" class="status-text">Searching location...</div>
      <div id="resultsList" class="results-list"></div>
    </div>

    <!-- Legend Box -->
    <div class="panel legend-panel">
      <div class="legend-item"><span class="dot free"></span> Free Parking</div>
      <div class="legend-item"><span class="dot paid"></span> Paid Parking</div>
      <div class="legend-item"><span class="dot timed"></span> Timed / Permit</div>
      <div class="legend-item"><span class="dot no-parking"></span> No Parking</div>
      <div class="legend-item"><span class="dot hgv"></span> HGV Parking</div>
    </div>
  </div>

  <!-- Floating Action Buttons -->
  <div class="fab-container">
    <button class="fab" title="Menu"><i data-lucide="menu"></i></button>
    <button class="fab" id="locateBtn" title="Current Location"><i data-lucide="navigation"></i></button>
    <button class="fab" id="recenterBtn" title="Target Center"><i data-lucide="disc"></i></button>
  </div>

  <script>
    // Initialize Mapbox Token
    mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN'; // Replace with your Mapbox Public Key

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [1.3134, 51.1279], // Dover coordinates [lng, lat]
      zoom: 14
    });

    // Sample parking markers data fallback
    const sampleParkings = [
      { name: "Priory Street Car Park", type: "paid", lng: 1.3092, lat: 51.1265 },
      { name: "Maison Dieu Car Park", type: "free", lng: 1.3115, lat: 51.1290 },
      { name: "Town Centre Timed Bay", type: "timed", lng: 1.3140, lat: 51.1250 },
      { name: "Dover Port HGV Rest", type: "hgv", lng: 1.3200, lat: 51.1220 }
    ];

    let currentMarkers = [];
    let activeFilter = 'all';

    map.on('load', () => {
      lucide.createIcons();
      executeSearch('Dover');
    });

    // Handle Search Execution
    async function executeSearch(query) {
      const statusEl = document.getElementById('statusText');
      const resultsEl = document.getElementById('resultsList');
      statusEl.style.display = 'block';
      statusEl.textContent = 'Searching location...';
      resultsEl.innerHTML = '';

      try {
        // Geocoding request
        const response = await fetch(
          `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}`
        );
        
        if (!response.ok) throw new Error('Geocoding request failed');
        
        const data = await response.json();

        if (data.features && data.features.length > 0) {
          const [lng, lat] = data.features[0].center;

          map.flyTo({ center: [lng, lat], zoom: 14, speed: 1.2 });

          // Wait until map movement ends to fetch nearby spots
          map.once('moveend', () => {
            fetchNearbyParking(lng, lat);
          });
        } else {
          statusEl.textContent = 'Location not found.';
        }
      } catch (err) {
        console.warn('Geocoding error, falling back to local dataset:', err);
        // Fallback gracefully so UI never stays stuck
        fetchNearbyParking(1.3134, 51.1279);
      }
    }

    // Load & display markers
    function fetchNearbyParking(lng, lat) {
      const statusEl = document.getElementById('statusText');
      const resultsEl = document.getElementById('resultsList');

      // Clear old markers
      currentMarkers.forEach(m => m.remove());
      currentMarkers = [];

      const filtered = sampleParkings.filter(p => activeFilter === 'all' || p.type === activeFilter);

      if (filtered.length === 0) {
        statusEl.textContent = 'No matching parking found.';
        return;
      }

      statusEl.style.display = 'none';

      filtered.forEach(spot => {
        const colorMap = {
          free: '#22c55e',
          paid: '#f97316',
          timed: '#eab308',
          'no-parking': '#ef4444',
          hgv: '#a855f7'
        };

        const marker = new mapboxgl.Marker({ color: colorMap[spot.type] || '#22c55e' })
          .setLngLat([spot.lng, spot.lat])
          .setPopup(new mapboxgl.Popup().setText(spot.name))
          .addTo(map);

        currentMarkers.push(marker);

        const item = document.createElement('div');
        item.className = 'result-item';
        item.textContent = spot.name;
        item.onclick = () => {
          map.flyTo({ center: [spot.lng, spot.lat], zoom: 16 });
        };
        resultsEl.appendChild(item);
      });
    }

    // UI Event Listeners
    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = document.getElementById('searchInput').value.trim();
      if (q) executeSearch(q);
    });

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const q = e.target.value.trim();
        if (q) executeSearch(q);
      }
    });

    // Filter Chips Toggle
    document.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        e.currentTarget.classList.add('active');
        activeFilter = e.currentTarget.getAttribute('data-filter');
        const center = map.getCenter();
        fetchNearbyParking(center.lng, center.lat);
      });
    });

    // Toggle Hide/Show panel
    function toggleNearestPanel() {
      const panel = document.getElementById('nearestPanel');
      panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    }

    // Geolocation control
    document.getElementById('locateBtn').addEventListener('click', () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const { longitude, latitude } = pos.coords;
          map.flyTo({ center: [longitude, latitude], zoom: 15 });
          fetchNearbyParking(longitude, latitude);
        });
      }
    });

    document.getElementById('recenterBtn').addEventListener('click', () => {
      map.flyTo({ center: [1.3134, 51.1279], zoom: 14 });
    });
  </script>
</body>
</html>
